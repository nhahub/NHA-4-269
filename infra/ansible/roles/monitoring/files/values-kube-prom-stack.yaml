prometheus:
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    nodeSelector:
      role: monitoring

alertmanager:
  service:
    type: NodePort
    nodePort: 30093
  alertmanagerSpec:
    nodeSelector:
      role: monitoring
    # mounts k8s secret 'alertmanager-smtp' at /etc/alertmanager/secrets/alertmanager-smtp/password
    secrets:
      - alertmanager-smtp
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "amirazzamm@gmail.com"
      smtp_auth_username: "amirazzamm@gmail.com"
      smtp_auth_password_file: "/etc/alertmanager/secrets/alertmanager-smtp/password"
      smtp_require_tls: true
    route:
      group_by: ["namespace", "alertname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: "email"
      routes:
        # Watchdog = always-firing heartbeat; InfoInhibitor = helper meta-alert.
        # Neither is a real problem — route to null so they don't email.
        - receiver: "null"
          matchers:
            - alertname =~ "Watchdog|InfoInhibitor"
    receivers:
      - name: "null"
      - name: "email"
        email_configs:
          - to: "amirazzamm@gmail.com"
            send_resolved: true

grafana:
  adminPassword: "admin"
  service:
    type: NodePort
    nodePort: 30030
  nodeSelector:
    role: monitoring

prometheusOperator:
  nodeSelector:
    role: monitoring

kube-state-metrics:
  nodeSelector:
    role: monitoring