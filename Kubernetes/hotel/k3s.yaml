apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-service
  namespace: wijha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-service
  template:
    metadata:
      labels:
        app: hotel-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: hotel-service
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        role: app
      containers:
      - name: hotel-service
        image: amirazzamm/hotel-service:latest  #new image by github action
        #image: amirazzamm/wijha-hotel:v1.0.0
        ports:
        - name: http
          containerPort: 8082
        env:
        - { name: SERVICE_NAME, value: "hotel-service" }
        - { name: PORT,         value: "8082" }
        livenessProbe:
          httpGet: { path: /health, port: 8082 }
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 8082 }
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests: { memory: "64Mi",  cpu: "50m" }
          limits:   { memory: "128Mi", cpu: "250m" }
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-service
  namespace: wijha
  labels:
    app: hotel-service
spec:
  type: ClusterIP
  selector:
    app: hotel-service
  ports:
  - name: http
    port: 8082
    targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hotel-service
  namespace: wijha
  labels:
    release: kube-prom
spec:
  selector:
    matchLabels:
      app: hotel-service
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hotel-service
  namespace: wijha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hotel-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
