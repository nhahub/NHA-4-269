apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service
  namespace: wijha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-service
  template:
    metadata:
      labels:
        app: weather-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: weather-service
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        role: app
      containers:
      - name: weather-service
        image: amirazzamm/weather-service:latest  #new image by github action
        #image: amirazzamm/wijha-weather:v1.0.0
        ports:
        - containerPort: 8083
        env:
        - { name: SERVICE_NAME, value: "weather-service" }
        - { name: PORT,         value: "8083" }
        livenessProbe:
          httpGet: { path: /health, port: 8083 }
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 8083 }
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests: { memory: "64Mi",  cpu: "50m" }
          limits:   { memory: "128Mi", cpu: "250m" }
---
apiVersion: v1
kind: Service
metadata:
  name: weather-service
  namespace: wijha
spec:
  type: ClusterIP
  selector:
    app: weather-service
  ports:
  - port: 8083
    targetPort: 8083
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: weather-service
  namespace: wijha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weather-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
