apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: wijha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: gateway
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        role: app
      containers:
      - name: gateway
        image: amirazzamm/gateway-service:latest  #new image by github action
        #image: amirazzamm/wijha-gateway:v1.0.0
        ports:
        - containerPort: 8080
        env:
        - { name: PORT,         value: "8080" }
        - { name: FLIGHT_URL,   value: "http://flight-service:8081" }
        - { name: HOTEL_URL,    value: "http://hotel-service:8082" }
        - { name: WEATHER_URL,  value: "http://weather-service:8083" }
        - { name: CURRENCY_URL, value: "http://currency-service:8084" }
        - { name: CACHE_TTL_SECONDS, value: "60" }
        livenessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests: { memory: "64Mi",  cpu: "50m" }
          limits:   { memory: "128Mi", cpu: "250m" }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: wijha
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: wijha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70