- name: create argocd NS
  ansible.builtin.command: >
    k3s kubectl create namespace argocd
    --dry-run=client -o yaml
  register: argocd_ns
  changed_when: false

- name: apply argocd ns 
  ansible.builtin.shell: |
    echo '{{ argocd_ns.stdout }}' | k3s kubectl apply -f -
  register: ns_apply
  changed_when: "'created' in ns_apply.stdout"

- name: install argocd
  ansible.builtin.shell: |
    k3s kubectl apply --server-side=true --force-conflicts -n argocd \
      -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  register: argocd_install
  changed_when: "'created' in argocd_install.stdout"

- name: expose argocd-server as NodePort 30443
  ansible.builtin.shell: |
    k3s kubectl -n argocd patch svc argocd-server \
      -p '{"spec":{"type":"NodePort","ports":[{"name":"https","port":443,"targetPort":8080,"nodePort":30443}]}}'
  register: argocd_np
  changed_when: "'patched' in argocd_np.stdout"

- name: wait for argocd-server rollout
  ansible.builtin.command: >
    k3s kubectl -n argocd rollout status deploy/argocd-server --timeout=180s
  changed_when: false

- name: get argocd initial admin password
  ansible.builtin.shell: |
    k3s kubectl -n argocd get secret argocd-initial-admin-secret \
      -o jsonpath="{.data.password}" | base64 -d
  register: argocd_pw
  changed_when: false

- name: show argocd admin password
  ansible.builtin.debug:
    msg: "argocd admin password: {{argocd_pw.stdout}}"
    
    