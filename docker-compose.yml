# Local dev / demo stack for the Wanderly travel aggregator.
# One command brings up all microservices + Redis cache + frontend.
#   docker compose up --build
# Then open http://localhost:8088
services:
  flight-service:
    build: ./services/flight-service
    environment:
      - SERVICE_NAME=flight-service
      - PORT=8081
    ports:
      - "8081:8081"

  hotel-service:
    build: ./services/hotel-service
    environment:
      - SERVICE_NAME=hotel-service
      - PORT=8082
    ports:
      - "8082:8082"

  weather-service:
    build: ./services/weather-service
    environment:
      - SERVICE_NAME=weather-service
      - PORT=8083
    ports:
      - "8083:8083"

  currency-service:
    build: ./services/currency-service
    environment:
      - SERVICE_NAME=currency-service
      - PORT=8084
    ports:
      - "8084:8084"

  redis:
    image: redis:7-alpine
    # No host port mapping — only the gateway needs it, over the compose network.
    expose:
      - "6379"

  gateway:
    build: ./services/gateway
    environment:
      - SERVICE_NAME=gateway
      - PORT=8080
      - FLIGHT_URL=http://flight-service:8081
      - HOTEL_URL=http://hotel-service:8082
      - WEATHER_URL=http://weather-service:8083
      - CURRENCY_URL=http://currency-service:8084
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL_SECONDS=60
    ports:
      - "8080:8080"
    depends_on:
      - flight-service
      - hotel-service
      - weather-service
      - currency-service
      - redis

  frontend:
    build: ./frontend
    ports:
      - "8088:80"
    depends_on:
      - gateway
