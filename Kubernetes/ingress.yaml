apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wijha-ingress
  namespace: wijha
spec:
  ingressClassName: traefik
  rules:
  - host: wijha.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
