apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: wijha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: frontend
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        role: app
      containers:
      - name: frontend
        image: amirazzamm/frontend-service:latest  #new image by github action
        #image: amirazzamm/wijha-frontend:v1.0.0
        ports:
        - containerPort: 80
        env:
        - { name: SERVICE_NAME, value: "frontend" }
        - { name: PORT,         value: "80" }
        livenessProbe:
          httpGet: { path: /health, port: 80 }
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 80 }
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests: { memory: "32Mi",  cpu: "25m" }
          limits:   { memory: "64Mi", cpu: "100m" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: wijha
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30088
